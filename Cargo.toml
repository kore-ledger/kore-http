[package]
name = "kore-http"
version = "0.2.0"
edition = "2021"

[dependencies]
# Common
tokio = { version = "1.38.0", features = ["full"] }
config = { version = "0.14.0", features = ["json", "toml", "yaml"]}
log = "0.4.21"
log4rs = "1.3.0"

# Http
axum = "0.7.5"
tower = "0.4.13"
tower-http = {version = "0.5.2", features = ["trace", "metrics"]}
tracing = "0.1.40"
utoipa = { version = "4.2.3", features = ["axum_extras"] }

# Kore
kore-node = { git = "https://github.com/kore-ledger/kore-node.git", version = "0.5.0"}