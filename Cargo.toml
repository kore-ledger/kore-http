[package]
name = "kore-http"
version = "0.3.0"
edition = "2021"

[dependencies]
# Common
tokio = { version = "1.38.0", features = ["full"] }
config = { version = "0.14.0", features = ["json", "toml", "yaml"]}
log = "0.4.21"
log4rs = "1.3.0"
serde_json = {version = "1.0.117", optional = true}
serde = {version = "1.0.203", optional = true}

# Http
axum = "0.7.5"
tower = "0.4.13"
tower-http = {version = "0.5.0", features = ["trace", "metrics", "cors"]}
tracing = "0.1.40"
utoipa = { version = "4.2.3", features = ["axum_extras"], optional = true}
utoipa-rapidoc = { version = "4.0.0", features = ["axum"], optional = true}

# Kore
kore-node = { git = "https://github.com/kore-ledger/kore-node.git", default-features = false, features = [], version = "0.5.7"}

[dev-dependencies]
serial_test = "3.0"
tempfile = "3.2"
reqwest = { version = "0.12", features = ["json"] }

[features]
default = ["doc", "prometheus", "leveldb"]
doc = ["serde", "serde_json", "utoipa-rapidoc", "utoipa"]
leveldb = ["kore-node/leveldb"]
sqlite = ["kore-node/sqlite"]
prometheus = ["kore-node/prometheus"]